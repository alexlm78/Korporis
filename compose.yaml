version: '3'
services:
  # MySQL Database
  kauthDB:
    image: mysql:8.4
    container_name: korporisDB
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: korporis
      MYSQL_ROOT_PASSWORD: K0rp0r15#123
      MYSQL_USER: korporis
      MYSQL_PASSWORD: k0rp0r15
    volumes:
      - korporis-volT0:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - kreaker-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pK0rp0r15#123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  korporis-volT0:

networks:
  kreaker-net: